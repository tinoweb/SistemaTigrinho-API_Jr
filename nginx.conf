server {
    listen 80;
    server_name localhost;
    root /var/www/html;
    index index.php index.html index.htm;

    # Bloqueio de arquivos confidenciais e de sistema
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.svn|\.project|LICENSE|README.md|package.json|package-lock.json|\.env|node_modules) {
        return 404;
    }

    # Redirecionamento do Webhook da Pragmatic Play (PP)
    location = /api/webhook.php {
        rewrite ^/api/webhook.php$ /pp/api/webhook.php last;
    }

    # Pragmatic Play (Painel CodeIgniter)
    location ^~ /pp/ {
        alias /var/www/html/pp/;
        index index.php index.html;
        
        if (!-e $request_filename) {
            rewrite ^/pp/(.*)$ /pp/index.php last;
        }
        
        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass tigrinho_php:9000;
            fastcgi_param SCRIPT_FILENAME $request_filename;
            fastcgi_param APP_URL "https://$host/pp/";
        }
    }

    # gs2c (Pragmatic Play)
    location ^~ /gs2c/ {
        alias /var/www/html/pp/gs2c/;
        index index.html;
        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass tigrinho_php:9000;
            fastcgi_param SCRIPT_FILENAME $request_filename;
        }
    }
    
    # EXgames (Pragmatic Play)
    location ^~ /EXgames/ {
        alias /var/www/html/pp/EXgames/;
    }

    # Execução de outros arquivos PHP (Admin, Login, Cadastro, etc.)
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass tigrinho_php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Todo o resto das rotas vai para a API Node.js
    location / {
        proxy_pass http://tigrinho_api:3016;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header REMOTE-HOST $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;

        proxy_connect_timeout 30s;
        proxy_read_timeout 86400s;
        proxy_send_timeout 30s;
    }
}
