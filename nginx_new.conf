server
{
    listen 80;
    listen 443 ssl ;
    server_name api.stellgames.com igames.stellgames.com igame.stellgames.com;
    index index.html index.htm default.htm default.html;
    # root /www/wwwroot/stellgames.com/api/;
    
    #SSL-START SSL related configuration
    #error_page 404/404.html;
    #HTTP_TO_HTTPS_START
    if ($server_port !~ 443){
        rewrite ^(/.*)$ https://$host$1 permanent;
    }
    #HTTP_TO_HTTPS_END
        ssl_certificate    /www/server/panel/vhost/cert/apipg/fullchain.pem;
        ssl_certificate_key    /www/server/panel/vhost/cert/apipg/privkey.pem;
        ssl_protocols TLSv1.1 TLSv1.2;
        ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_tickets on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        add_header Strict-Transport-Security "max-age=31536000";
        error_page 497  https://$host$request_uri;
    
    
    #SSL-END
    
    #ERROR-PAGE-START  Error page related configuration
    #error_page 404 /404.html;
    #error_page 502 /502.html;
    #ERROR-PAGE-END
    
    
    #REWRITE-START Pseudo-static related configuration
    include /www/server/panel/vhost/rewrite/node_apipg.conf;
    #REWRITE-END
    
    #Files or directories forbidden to access
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.svn|\.project|LICENSE|README.md|package.json|package-lock.json|\.env|node_modules) {
        return 404;
    }
    
    #One-click application for SSL certificate verification directory related settings
    location /.well-known/ {
        root  /www/wwwroot/stellgames.com/api/;
    }

    # PP Integration
    location = /api/webhook.php {
        rewrite ^/api/webhook.php$ /pp/api/webhook.php last;
    }

    location ^~ /pp/ {
        alias /www/wwwroot/stellgames.com/apipp/;
        index index.php index.html;
        
        if (!-e $request_filename) {
            rewrite ^/pp/(.*)$ /pp/index.php last;
        }
        
        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass unix:/tmp/php-cgi-74.sock;
            fastcgi_param SCRIPT_FILENAME $request_filename;
            fastcgi_param APP_URL "https://api.stellgames.com/pp/";
        }
    }

    location ^~ /gs2c/ {
        alias /www/wwwroot/stellgames.com/apipp/gs2c/;
        index index.html;
        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass unix:/tmp/php-cgi-74.sock;
            fastcgi_param SCRIPT_FILENAME $request_filename;
        }
    }
    
    location ^~ /EXgames/ {
        alias /www/wwwroot/stellgames.com/apipp/EXgames/;
    }

    # HTTP reverse proxy related settings begin >>>
    location ~ /purge(/.*) {
        proxy_cache_purge cache_one $host$request_uri$is_args$args;
    }

    location / {
        proxy_pass http://127.0.0.1:3016;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header REMOTE-HOST $remote_addr;
        add_header X-Cache $upstream_cache_status;

        proxy_connect_timeout 30s;
        proxy_read_timeout 86400s;
        proxy_send_timeout 30s;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    # End of HTTP reverse proxy related settings <<<
    
    access_log  /www/wwwlogs/apipg.log;
    error_log  /www/wwwlogs/apipg.error.log;
}
